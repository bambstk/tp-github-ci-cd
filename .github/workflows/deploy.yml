name: Deploy

on:
  workflow_dispatch:
    inputs:
      mon_input:
        description: "Choisis en vif sur quel environement tu deploie le zin (choisi bien)"
        required: true
        default: "deploy-staging"
        type: choice
        options:
          - deploy-staging
          - deploy-production

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Déployer en staging
        run: |
          echo "✅ Déploiement en staging réussi"
          echo "URL : https://staging.nexacloud.example.com"

  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging         # attend que staging soit terminé ET approuvé

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Déployer en production
        run: |
          echo "🚀 Déploiement en production réussi"
          echo "URL : https://nexacloud.example.com"